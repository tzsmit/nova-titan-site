<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Title -->
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }} | {{ site.description }}{% endif %}</title>

  <!-- SEO Tags (jekyll-seo-tag plugin) -->
  {% seo title=false %}

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image" content="{{ site.url }}/assets/images/nova-titan-og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="Nova Titan Systems">
  <meta property="og:locale" content="en_US">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="{{ site.url }}{{ page.url }}">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:image" content="{{ site.url }}/assets/images/nova-titan-og-image.png">

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Preconnect for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

  <!-- Plausible Analytics (Privacy-Friendly) -->

  <!-- AggregateRating Schema for Testimonials -->
  {% if page.url == '/testimonials/' or page.url == '/testimonials/index.html' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "@id": "{{ site.url }}/#organization",
    "name": "Nova Titan Systems LLC",
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "{{ site.data.testimonials.aggregate.average_rating }}",
      "bestRating": "5",
      "worstRating": "1",
      "ratingCount": "{{ site.data.testimonials.aggregate.total_reviews }}",
      "reviewCount": "{{ site.data.testimonials.aggregate.total_reviews }}"
    },
    "review": [
      {% for testimonial in site.data.testimonials limit:10 %}
        {% if testimonial.name %}
      {
        "@type": "Review",
        "author": {
          "@type": "Person",
          "name": "{{ testimonial.name }}"
        },
        "datePublished": "{{ testimonial.date }}",
        "reviewBody": "{{ testimonial.review | escape }}",
        "reviewRating": {
          "@type": "Rating",
          "ratingValue": "{{ testimonial.rating }}",
          "bestRating": "5",
          "worstRating": "1"
        }
      }{% unless forloop.last %},{% endunless %}
        {% endif %}
      {% endfor %}
    ]
  }
  </script>
  {% endif %}

  <!-- Base Styles -->
  <style>
    :root { 
      --cy: #00d4ff; 
      --gr: #00ff88; 
      --purple: #b300ff;
      --red: #ff0066;
      --orange: #ff8800;
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg,#0a0a0f 0%,#1a1a2e 50%,#16213e 100%); 
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Matrix Background */
    .matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: matrix-move 20s linear infinite;
      z-index: 0;
    }
    
    @keyframes matrix-move {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }
    
    /* Particle Background */
    #particles-js { 
      position: fixed; 
      inset: 0; 
      z-index: 0; 
    }
    
    .content { 
      position: relative; 
      z-index: 1; 
    }

    /* Glow Effects */
    .glow { 
      text-shadow: 0 0 20px rgba(0,212,255,.6); 
    }
    .glow-green { 
      text-shadow: 0 0 20px rgba(0,255,136,.6); 
    }
    .glow-purple { 
      text-shadow: 0 0 20px rgba(179,0,255,.6); 
    }
  </style>

  <!-- Page-specific head content -->
  {% if page.extra_head %}{{ page.extra_head }}{% endif %}

  <!-- Procurement schema for government/partner pages -->
  {% include schema-org.html %}
</head>
