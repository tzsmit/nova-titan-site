name: SEO QA
on:
  pull_request:
  push:
    branches: [main]

jobs:
  seo-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: SEO invariants (guard rails from 2026-07 audit)
        run: |
          set -e
          echo "1. Homepage has exactly one canonical"
          test "$(grep -c 'rel="canonical"' _site/index.html)" = "1"
          echo "2. LocalBusiness/ElectricalContractor schema present on homepage"
          grep -q 'ElectricalContractor' _site/index.html
          echo "3. Sitemap generated and contains money pages"
          test -f _site/sitemap.xml
          grep -q '/services/low-voltage-subcontractor-lubbock-tx/' _site/sitemap.xml
          grep -q '/quote/' _site/sitemap.xml
          echo "4. robots.txt present"
          test -f _site/robots.txt
          echo "5. Blog posts actually build (regression guard for *.md exclude bug)"
          test -d _site/blog/wifi-security
          echo "5b. Blog index never links to a URL that did not build"
          for u in $(grep -o 'href="/blog/[a-z0-9-]*/"' _site/blog/index.html | sed 's/href="//;s/"//'); do
            test -f "_site$u/index.html" || { echo "BROKEN blog link: $u"; exit 1; }
          done
          echo "6. Legacy redirects generated by jekyll-redirect-from"
          test -f _site/services/amarillo/index.html
          grep -q 'low-voltage-subcontractor-amarillo-tx' _site/services/amarillo/index.html
          echo "7. thank-you is noindexed"
          grep -q 'noindex' _site/thank-you/index.html
          echo "8. No empty aggregateRating"
          ! grep -q '"ratingValue": ""' _site/testimonials/index.html
          echo "All SEO invariants passed."

      - name: Internal link check (non-blocking report)
        run: |
          npx --yes linkinator ./_site --recurse --silent \
            --skip "tally.so|linkedin.com|facebook.com|tiktok.com|instagram.com|yelp.com|mapquest.com|twitter.com|x.com|github.com|plausible.io|googletagmanager.com|fonts." \
            || echo "::warning::linkinator found issues"
